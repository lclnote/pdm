services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pdm
      POSTGRES_PASSWORD: pdm
      POSTGRES_DB: pdm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pdm:pdm@db:5432/pdm
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
    ports:
      - "8001:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./welcome:/var/www/welcome:ro
      - ./certbot-webroot:/var/www/certbot
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
  node_modules:
